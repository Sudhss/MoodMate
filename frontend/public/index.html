<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodMate AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Syne:wght@400;500;600&family=JetBrains+Mono:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    /* &#9472;&#9472; Reset &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472; */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --paper: #faf8f5;
      --cream: #f2ede6;
      --cream2: #ece6dd;
      --white: #ffffff;
      --ink: #1a1814;
      --ink2: #3d3a35;
      --ink3: #6b6760;
      --ink4: #9e9a95;
      --ink5: #c5c1bb;
      --rule: rgba(26, 24, 20, 0.1);
      --rule2: rgba(26, 24, 20, 0.06);
      --warm: #c4603a;
      --warm2: #d4724c;
      --warm-dim: rgba(196, 96, 58, 0.09);
      --warm-b: rgba(196, 96, 58, 0.22);
      --sidebar-w: 280px;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Syne', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--ink5);
      border-radius: 2px;
    }

    /* &#9472;&#9472; SIDEBAR &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472; */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      height: 100vh;
      background: var(--cream);
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
      position: relative;
      z-index: 10;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--rule);
    }

    .sidebar-brand {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--ink);
      margin-bottom: 14px;
    }

    .sidebar-brand em {
      font-style: italic;
      color: var(--warm);
    }

    .new-chat-btn {
      width: 100%;
      padding: 9px 16px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 3px;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .new-chat-btn:hover {
      background: var(--warm);
    }

    .sidebar-section-label {
      padding: 16px 20px 8px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink4);
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 16px;
    }

    .chat-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 1px;
      position: relative;
    }

    .chat-item:hover {
      background: var(--cream2);
    }

    .chat-item.active {
      background: var(--white);
    }

    .chat-item-title {
      font-size: 13px;
      font-weight: 400;
      color: var(--ink2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .chat-item.active .chat-item-title {
      color: var(--ink);
      font-weight: 500;
    }

    .chat-item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-item-mode {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--warm);
      background: var(--warm-dim);
      border: 1px solid var(--warm-b);
      border-radius: 2px;
      padding: 1px 5px;
    }

    .chat-item-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink4);
    }

    .chat-item-delete {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      border-radius: 4px;
      background: none;
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--ink4);
      transition: all 0.15s;
    }

    .chat-item:hover .chat-item-delete {
      display: flex;
    }

    .chat-item-delete:hover {
      background: #fee2e2;
      color: #dc2626;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--rule);
      font-size: 11px;
      color: var(--ink4);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* &#9472;&#9472; MAIN &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472; */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* &#9472;&#9472; TOP BAR &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472; */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      border-bottom: 1px solid var(--rule);
      background: rgba(250, 248, 245, 0.9);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink3);
      padding: 4px;
    }

    .chat-title-input {
      font-family: var(--serif);
      font-size: 17px;
      font-weight: 400;
      color: var(--ink);
      border: none;
      background: transparent;
      outline: none;
      min-width: 120px;
      max-width: 280px;
    }

    .chat-title-input::placeholder {
      color: var(--ink4);
    }

    /* Mode selector */
    .mode-selector {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mode-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--rule);
      background: transparent;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink3);
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .mode-btn:hover {
      border-color: var(--ink3);
      color: var(--ink);
    }

    .mode-btn.active {
      background: var(--warm-dim);
      border-color: var(--warm-b);
      color: var(--warm);
    }

    /* &#9472;&#9472; CHAT AREA &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472; */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }

    .empty-state-heading {
      font-family: var(--serif);
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 16px;
    }

    .empty-state-heading em {
      font-style: italic;
      color: var(--warm);
    }

    .empty-state-sub {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 300;
      color: var(--ink3);
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .mode-quick-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 480px;
      width: 100%;
    }

    .mode-quick-card {
      padding: 16px 18px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      font-family: var(--sans);
    }

    .mode-quick-card:hover {
      border-color: var(--warm-b);
      background: var(--warm-dim);
    }

    .mode-quick-card.selected {
      border-color: var(--warm);
      background: var(--warm-dim);
    }

    .mqc-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .mqc-desc {
      font-size: 12px;
      color: var(--ink3);
      line-height: 1.4;
    }

    /* Date separator */
    .date-sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 16px;
    }

    .date-sep-line {
      flex: 1;
      height: 1px;
      background: var(--rule2);
    }

    .date-sep-text {
      font-size: 11px;
      color: var(--ink4);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Messages */
    .msg-row {
      display: flex;
      margin-bottom: 14px;
      animation: msgIn 0.28s ease both;
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .msg-row.ai {
      justify-content: flex-start;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-wrap {
      max-width: 72%;
      display: flex;
      flex-direction: column;
    }

    .msg-row.user .msg-wrap {
      align-items: flex-end;
    }

    .msg-row.ai .msg-wrap {
      align-items: flex-start;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .msg-bubble {
      background: var(--ink);
      color: var(--paper);
      border-radius: 16px 4px 16px 16px;
    }

    .msg-row.ai .msg-bubble {
      background: var(--white);
      color: var(--ink);
      border: 1px solid var(--rule);
      border-radius: 4px 16px 16px 16px;
    }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .msg-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink4);
    }

    .msg-mode-tag {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--warm);
      background: var(--warm-dim);
      border: 1px solid var(--warm-b);
      border-radius: 2px;
      padding: 1px 5px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 4px 16px 16px 16px;
      width: fit-content;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink4);
      animation: typingBounce 1.2s ease infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes typingBounce {

      0%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      40% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* Error bubble */
    .error-bubble {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #fff8f6;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: 13px;
      color: #dc2626;
      max-width: 72%;
    }

    /* &#9472;&#9472; INPUT BAR &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472; */
    #input-bar {
      padding: 16px 32px 20px;
      border-top: 1px solid var(--rule);
      background: var(--paper);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 10px 12px 10px 18px;
      transition: border-color 0.2s;
      max-width: 860px;
      margin: 0 auto;
    }

    .input-wrap:focus-within {
      border-color: var(--ink3);
    }

    #msg-input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: var(--serif);
      font-size: 16px;
      font-weight: 300;
      color: var(--ink);
      resize: none;
      min-height: 24px;
      max-height: 140px;
      line-height: 1.5;
    }

    #msg-input::placeholder {
      color: var(--ink4);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--ink);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--warm);
    }

    .send-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .send-btn svg {
      stroke: var(--paper);
    }

    .input-hint {
      text-align: center;
      margin-top: 8px;
      font-size: 11px;
      color: var(--ink4);
      letter-spacing: 0.03em;
    }

    /* &#9472;&#9472; SETTINGS MODAL &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472; */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(26, 24, 20, 0.45);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 44px 44px 36px;
      width: 100%;
      max-width: 440px;
      transform: translateY(16px);
      transition: transform 0.3s ease;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.12);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-title {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .modal-title em {
      font-style: italic;
      color: var(--warm);
    }

    .modal-sub {
      font-family: var(--serif);
      font-size: 15px;
      font-weight: 300;
      color: var(--ink3);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .modal-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 8px;
      display: block;
    }

    .modal-input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--rule);
      border-radius: 3px;
      background: var(--white);
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    .modal-input:focus {
      border-color: var(--ink3);
    }

    .modal-save {
      width: 100%;
      padding: 12px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 3px;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal-save:hover {
      background: var(--warm);
    }

    .modal-note {
      margin-top: 16px;
      font-size: 11px;
      color: var(--ink4);
      text-align: center;
      line-height: 1.6;
    }

    .modal-note a {
      color: var(--warm);
      text-decoration: none;
    }

    /* &#9472;&#9472; TOPBAR ACTIONS &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472; */
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      background: none;
      border: 1px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink3);
      transition: all 0.18s;
    }

    .icon-btn:hover {
      border-color: var(--rule);
      color: var(--ink);
      background: var(--cream);
    }

    /* Responsive */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        transform: translateX(-100%);
      }

      #sidebar.mobile-open {
        transform: translateX(0);
      }

      .mobile-menu-btn {
        display: flex;
      }

      #chat-area {
        padding: 20px 16px;
      }

      #input-bar {
        padding: 12px 16px 16px;
      }

      #topbar {
        padding: 0 16px;
      }

      .mode-selector {
        display: none;
      }

      .mode-quick-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">MoodMate <em>AI</em></div>
      <button class="new-chat-btn" onclick="App.newChat()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
        New Conversation
      </button>
    </div>
    <div class="sidebar-section-label">Conversations</div>
    <div class="chat-list" id="chat-list"></div>
    <div class="sidebar-footer">Powered by Groq &#183; LLaMA 3</div>
  </aside>

  <!-- MAIN -->
  <div id="main">

    <!-- TOP BAR -->
    <div id="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn icon-btn" onclick="App.toggleSidebar()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </button>
        <input type="text" id="chat-title" class="chat-title-input" placeholder="New conversation" maxlength="60"
          oninput="App.updateTitle(this.value)" />
      </div>
      <div class="mode-selector" id="mode-selector">
        <button class="mode-btn active" data-mode="supportive" onclick="App.setMode('supportive')">Supportive</button>
        <button class="mode-btn" data-mode="sarcastic" onclick="App.setMode('sarcastic')">Sarcastic</button>
        <button class="mode-btn" data-mode="brutally_honest" onclick="App.setMode('brutally_honest')">Brutally
          Honest</button>
        <button class="mode-btn" data-mode="neutral" onclick="App.setMode('neutral')">Neutral</button>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="App.openSettings()" title="Settings / API Key">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.3" />
            <path
              d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"
              stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </div>

    <!-- CHAT AREA -->
    <div id="chat-area">
      <!-- filled by JS -->
    </div>

    <!-- INPUT BAR -->
    <div id="input-bar">
      <div class="input-wrap">
        <textarea id="msg-input" placeholder="Say something..." rows="1" onkeydown="App.handleKey(event)"
          oninput="App.autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="App.send()" disabled>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7h10M8 3l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
      <div class="input-hint">Press Enter to send &nbsp;&#183;&nbsp; Shift+Enter for new line</div>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="modal-overlay" id="settings-modal" onclick="App.handleModalClick(event)">
    <div class="modal">
      <h2 class="modal-title">Settings <em>&amp; API</em></h2>
      <p class="modal-sub">Enter your Groq API key to enable MoodMate AI responses.</p>
      <label class="modal-label">Groq API Key</label>
      <input type="password" id="api-key-input" class="modal-input" placeholder="gsk_..." />
      <button class="modal-save" onclick="App.saveSettings()">Save &amp; Continue</button>
      <p class="modal-note">
        Get a free API key at
        <a href="https://console.groq.com" target="_blank">console.groq.com</a>
        &nbsp;&#183;&nbsp; Stored only in your browser.
      </p>
    </div>
  </div>

  <script>
    // &#9472;&#9472; SYSTEM PROMPTS &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
    const SYSTEM_PROMPTS = {
      supportive: `You are MoodMate AI in Supportive mode. Your role is to be a warm, empathetic, and non-judgmental companion. You listen deeply, validate feelings, and offer gentle encouragement. You never minimize problems. You ask thoughtful questions to help the person feel heard and understood. You offer comfort without toxic positivity. You acknowledge pain before suggesting anything. Keep responses conversational and human -- never robotic or clinical. Use natural language. Keep responses concise (2-4 sentences usually) unless the person clearly needs more. Never give unsolicited advice.`,

      sarcastic: `You are MoodMate AI in Sarcastic mode. You are witty, sharp, and a little cutting -- but never cruel. Your sarcasm comes from a place of care: you say the honest thing but with a dry, amused tone. You call out illogical thinking with humor. You're like a best friend who rolls their eyes but still has your back. Keep responses punchy and short. One or two sharp lines are better than a paragraph. Never punch down or be genuinely mean. The wit should land and then reveal the care underneath.`,

      brutally_honest: `You are MoodMate AI in Brutally Honest mode. You tell the truth plainly, without softening, flattery, or comfort. You do not validate things that don't deserve validation. You point out blind spots, contradictions, and flawed thinking directly. You are not rude -- you are precise. You respect the person enough to tell them what they need to hear, not what they want. Keep responses direct and clear. No padding. No reassurance that isn't earned. End with something actionable when relevant.`,

      neutral: `You are MoodMate AI in Neutral mode. You are analytical, clear, and objective. You present information, perspectives, and observations without emotional coloring. You do not take sides. You do not add encouragement or negativity. You simply help the person think through whatever they are dealing with by offering structured, factual, and balanced responses. Present multiple perspectives when relevant. Keep responses clear and organized. Use lists or structure when it aids clarity.`
    };

    const MODE_LABELS = {
      supportive: 'Supportive',
      sarcastic: 'Sarcastic',
      brutally_honest: 'Brutally Honest',
      neutral: 'Neutral'
    };

    const MODE_DESCS = {
      supportive: 'Warm, empathetic, non-judgmental.',
      sarcastic: 'Witty and sharp, with care underneath.',
      brutally_honest: 'Direct truth, no softening.',
      neutral: 'Analytical and objective.'
    };

    // &#9472;&#9472; STORAGE &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
    const Store = {
      getKey: () => localStorage.getItem('moodmate_api_key') || '',
      setKey: (k) => localStorage.setItem('moodmate_api_key', k),
      getChats: () => JSON.parse(localStorage.getItem('moodmate_chats') || '[]'),
      setChats: (chats) => localStorage.setItem('moodmate_chats', JSON.stringify(chats)),
      getActive: () => localStorage.getItem('moodmate_active') || null,
      setActive: (id) => localStorage.setItem('moodmate_active', id),
    };

    // &#9472;&#9472; HELPERS &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
    function now() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
    function today() { return new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 140) + 'px';
    }

    // &#9472;&#9472; APP STATE &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
    let state = {
      chats: [],
      activeId: null,
      mode: 'supportive',
      loading: false,
    };

    function activeChat() {
      return state.chats.find(c => c.id === state.activeId) || null;
    }

    // &#9472;&#9472; MAIN APP &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
    const App = {

      init() {
        state.chats = Store.getChats();
        state.activeId = Store.getActive();

        // If active chat no longer exists, clear
        if (state.activeId && !state.chats.find(c => c.id === state.activeId)) {
          state.activeId = null;
        }

        // Restore active chat mode
        const ac = activeChat();
        if (ac) state.mode = ac.mode || 'supportive';

        this.renderSidebar();
        this.renderChat();
        this.updateModeButtons();

        // Prompt for API key if not set
        if (!Store.getKey()) {
          setTimeout(() => this.openSettings(), 400);
        }

        // Input enable/disable
        document.getElementById('msg-input').addEventListener('input', () => {
          const v = document.getElementById('msg-input').value.trim();
          document.getElementById('send-btn').disabled = !v || state.loading;
        });
      },

      // &#9472;&#9472; SIDEBAR &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
      renderSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';

        const chats = [...state.chats].sort((a, b) => b.updatedAt - a.updatedAt);

        if (!chats.length) {
          list.innerHTML = `<div style="padding:20px 12px;font-family:var(--serif);font-size:14px;font-weight:300;color:var(--ink4);text-align:center;line-height:1.6;">Start your first<br>conversation above.</div>`;
          return;
        }

        chats.forEach(chat => {
          const el = document.createElement('div');
          el.className = 'chat-item' + (chat.id === state.activeId ? ' active' : '');
          el.onclick = () => this.selectChat(chat.id);
          el.innerHTML = `
        <div class="chat-item-title">${this.esc(chat.title || 'Untitled')}</div>
        <div class="chat-item-meta">
          <span class="chat-item-mode">${MODE_LABELS[chat.mode] || chat.mode}</span>
          <span class="chat-item-date">${new Date(chat.updatedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}</span>
        </div>
        <button class="chat-item-delete" onclick="event.stopPropagation();App.deleteChat('${chat.id}')" title="Delete">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      `;
          list.appendChild(el);
        });
      },

      // &#9472;&#9472; CHAT RENDER &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
      renderChat() {
        const area = document.getElementById('chat-area');
        const title = document.getElementById('chat-title');
        const chat = activeChat();

        if (!chat) {
          title.value = '';
          title.placeholder = 'New conversation';
          area.innerHTML = this.emptyStateHTML();
          return;
        }

        title.value = chat.title || '';

        if (!chat.messages || !chat.messages.length) {
          area.innerHTML = this.emptyStateHTML();
          return;
        }

        let html = '';
        let lastDate = '';

        chat.messages.forEach(msg => {
          const d = new Date(msg.ts).toDateString();
          if (d !== lastDate) {
            lastDate = d;
            const label = d === new Date().toDateString() ? 'Today' : new Date(msg.ts).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
            html += `<div class="date-sep"><div class="date-sep-line"></div><span class="date-sep-text">${label}</span><div class="date-sep-line"></div></div>`;
          }
          html += this.msgHTML(msg);
        });

        area.innerHTML = html;
        this.scrollToBottom();
      },

      msgHTML(msg) {
        const t = new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        if (msg.role === 'user') {
          return `<div class="msg-row user"><div class="msg-wrap">
        <div class="msg-bubble">${this.esc(msg.content)}</div>
        <div class="msg-meta"><span class="msg-time">${t}</span></div>
      </div></div>`;
        } else {
          const modeTag = msg.mode ? `<span class="msg-mode-tag">${MODE_LABELS[msg.mode] || msg.mode}</span>` : '';
          return `<div class="msg-row ai"><div class="msg-wrap">
        <div class="msg-bubble">${this.formatAI(msg.content)}</div>
        <div class="msg-meta">${modeTag}<span class="msg-time">${t}</span></div>
      </div></div>`;
        }
      },

      emptyStateHTML() {
        return `<div class="empty-state">
      <h2 class="empty-state-heading">What's on<br>your <em>mind?</em></h2>
      <p class="empty-state-sub">Choose a conversation mode, then say anything. I adapt to how you need me to respond.</p>
      <div class="mode-quick-grid">
        ${Object.entries(MODE_LABELS).map(([k, v]) => `
          <div class="mode-quick-card ${state.mode === k ? 'selected' : ''}" onclick="App.setMode('${k}');App.focusInput()">
            <div class="mqc-name">${v}</div>
            <div class="mqc-desc">${MODE_DESCS[k]}</div>
          </div>`).join('')}
      </div>
    </div>`;
      },

      // &#9472;&#9472; SEND MESSAGE &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
      async send() {
        const input = document.getElementById('msg-input');
        const content = input.value.trim();
        if (!content || state.loading) return;

        const apiKey = "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";
        if (!apiKey) {
          this.openSettings();
          return;
        }

        // Ensure a chat exists
        if (!state.activeId) {
          this.newChat();
        }

        const chat = activeChat();
        if (!chat) return;

        // Add user message
        const userMsg = { role: 'user', content, ts: Date.now() };
        chat.messages.push(userMsg);
        chat.updatedAt = Date.now();
        if (!chat.title && content.length > 0) {
          chat.title = content.slice(0, 42) + (content.length > 42 ? '...' : '');
          document.getElementById('chat-title').value = chat.title;
        }
        this.saveChats();

        // Reset input
        input.value = '';
        input.style.height = 'auto';
        document.getElementById('send-btn').disabled = true;

        state.loading = true;
        this.renderChat();
        this.appendTyping();
        this.renderSidebar();

        // Build message history for API (last 20 messages)
        const history = chat.messages.slice(-20).map(m => ({
          role: m.role === 'user' ? 'user' : 'assistant',
          content: m.content,
        }));

        try {
          const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`,
            },
            body: JSON.stringify({
              model: 'llama-3.3-70b-versatile',
              messages: [
                { role: 'system', content: SYSTEM_PROMPTS[state.mode] },
                ...history,
              ],
              max_tokens: 1024,
              temperature: state.mode === 'neutral' ? 0.3 : 0.85,
              stream: false,
            }),
          });

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err?.error?.message || `HTTP ${response.status}`);
          }

          const data = await response.json();
          const content = data.choices?.[0]?.message?.content || 'No response received.';

          const aiMsg = { role: 'assistant', content, mode: state.mode, ts: Date.now() };
          chat.messages.push(aiMsg);
          chat.updatedAt = Date.now();
          this.saveChats();

        } catch (err) {
          this.removeTyping();
          this.appendError(err.message);
          state.loading = false;
          return;
        }

        state.loading = false;
        this.removeTyping();
        this.renderChat();
        this.renderSidebar();
      },

      // &#9472;&#9472; TYPING INDICATOR &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
      appendTyping() {
        const area = document.getElementById('chat-area');
        const el = document.createElement('div');
        el.className = 'msg-row ai';
        el.id = 'typing-indicator-row';
        el.innerHTML = `<div class="msg-wrap"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
        area.appendChild(el);
        this.scrollToBottom();
      },

      removeTyping() {
        const el = document.getElementById('typing-indicator-row');
        if (el) el.remove();
      },

      appendError(message) {
        const area = document.getElementById('chat-area');
        const el = document.createElement('div');
        el.className = 'msg-row ai';
        el.innerHTML = `<div class="error-bubble">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#dc2626" stroke-width="1.3"/><path d="M7 4v3.5" stroke="#dc2626" stroke-width="1.3" stroke-linecap="round"/><circle cx="7" cy="10" r="0.75" fill="#dc2626"/></svg>
      ${this.esc(message)}. Check your API key in Settings.
    </div>`;
        area.appendChild(el);
        this.scrollToBottom();
      },

      // &#9472;&#9472; CHAT MANAGEMENT &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
      newChat() {
        const chat = {
          id: uid(),
          title: '',
          mode: state.mode,
          messages: [],
          createdAt: Date.now(),
          updatedAt: Date.now(),
        };
        state.chats.unshift(chat);
        state.activeId = chat.id;
        Store.setActive(chat.id);
        this.saveChats();
        this.renderSidebar();
        this.renderChat();
        this.focusInput();
      },

      selectChat(id) {
        state.activeId = id;
        Store.setActive(id);
        const chat = activeChat();
        if (chat) {
          state.mode = chat.mode || 'supportive';
          this.updateModeButtons();
        }
        this.renderSidebar();
        this.renderChat();
        // Close sidebar on mobile
        document.getElementById('sidebar').classList.remove('mobile-open');
      },

      deleteChat(id) {
        state.chats = state.chats.filter(c => c.id !== id);
        if (state.activeId === id) {
          state.activeId = state.chats[0]?.id || null;
          Store.setActive(state.activeId);
        }
        this.saveChats();
        this.renderSidebar();
        this.renderChat();
      },

      saveChats() {
        Store.setChats(state.chats);
      },

      updateTitle(val) {
        const chat = activeChat();
        if (!chat) return;
        chat.title = val;
        this.saveChats();
        this.renderSidebar();
      },

      // &#9472;&#9472; MODE &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
      setMode(mode) {
        state.mode = mode;
        const chat = activeChat();
        if (chat) {
          chat.mode = mode;
          this.saveChats();
        }
        this.updateModeButtons();
        // Re-render empty state with new selected mode card
        const chat2 = activeChat();
        if (!chat2 || !chat2.messages || !chat2.messages.length) {
          document.getElementById('chat-area').innerHTML = this.emptyStateHTML();
        }
      },

      updateModeButtons() {
        document.querySelectorAll('.mode-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.mode === state.mode);
        });
      },

      // &#9472;&#9472; SETTINGS &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
      openSettings() {
        document.getElementById('api-key-input').value = Store.getKey();
        document.getElementById('settings-modal').classList.add('open');
      },

      saveSettings() {
        const key = document.getElementById('api-key-input').value.trim();
        if (!key) return;
        Store.setKey(key);
        document.getElementById('settings-modal').classList.remove('open');
        this.focusInput();
      },

      handleModalClick(e) {
        if (e.target.id === 'settings-modal') {
          document.getElementById('settings-modal').classList.remove('open');
        }
      },

      // &#9472;&#9472; UTILS &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
      handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          this.send();
        }
      },

      autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 140) + 'px';
      },

      scrollToBottom() {
        const area = document.getElementById('chat-area');
        setTimeout(() => { area.scrollTop = area.scrollHeight; }, 30);
      },

      focusInput() {
        setTimeout(() => document.getElementById('msg-input').focus(), 100);
      },

      toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('mobile-open');
      },

      esc(str) {
        if (!str) return '';
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/\n/g, '<br>');
      },

      formatAI(str) {
        if (!str) return '';
        // Bold: **text**
        str = str.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // Italic: *text*
        str = str.replace(/\*(.*?)\*/g, '<em>$1</em>');
        // Line breaks
        str = str.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
        // Escape HTML entities first (done before regex replacements above -- so redo properly)
        return str;
      },
    };

    // &#9472;&#9472; BOOT &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
    App.init();
  </script>
